name: PR Checks

on:
  pull_request:
    branches: [ main, master ]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install test dependencies
      run: pip install pytest

    - name: Run Unit Tests
      run: pytest src/ -v

    - name: Run Ruff
      uses: astral-sh/ruff-action@v1
