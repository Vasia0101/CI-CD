name: PR Checks

on:
  pull_request:
    branches:
    - main
    - master

jobs:
  quality-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install tools
      run: pip install pytest ruff
    
    - name: Run ALL Unit Tests (required to pass)
      run: pytest tests/ -v
    
    - name: Run Ruff
      run: ruff check . --output-format=github --exit-non-zero-on-fix
