name: PR Checks

on:
  pull_request:
    branches:
    - main
    - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependensies
      run: |
        pip install --upgrade pip
        pip install ruff
        pip install pytest

    - name: Run Unit Tests
      run: pytest tests/ -v

    - name: Run Ruff
      uses: astral-sh/ruff-action@v1
      with:
        args: "check --output-format=github"

